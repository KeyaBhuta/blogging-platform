<!DOCTYPE html>
<html lang='en'>
<head>
<meta charset='UTF-8'>
<title>Create Blog - BlogHub</title>
<style>
body { font-family: Arial, sans-serif; max-width: 700px; margin: 40px auto; padding: 20px
; }
input, select, textarea { width:100%; padding:10px; margin:8px 0;
box-sizing:border-box; border:1px solid #ccc; border-radius:4px
; }
textarea { height: 300px; }
button { padding:12px 24px; background:#2563eb; color:white;
border:none; border-radius:4px; cursor:pointer; font-size:16px; }
.error { color:red; }
a { color:#2563eb; }
</style>
</head>
<body>
<p><a href='index.html'>&larr; Back</a></p>
<h2>Create New Blog</h2>
<input id='title' placeholder='Blog Title'>
<select id='category'>
<option value=''>Select Category</option>
<option value='1'>Tech</option>
<option value='2'>Travel</option>
<option value='3'>Health</option>
<option value='4'>Finance</option>
<option value='5'>Lifestyle</option>
</select>
<textarea id='content' placeholder='Write your blog content here...'></textarea>
<button onclick='doCreate()'>Publish Blog</button>
<p class='error' id='err'></p>
<script src='js/api.js'></script>
<script>
if (!isLoggedIn()) window.location.href = 'login.html';
async function doCreate() {
const title = document.getElementById('title').value.trim();
const content = document.getElementById('content').value.trim();
const categoryId = document.getElementById('category').value;
if (!title || !content) {
document.getElementById('err').textContent = 'Title and content required';
return;
}
const data = await createBlog(title, content, categoryId || null);
if (data.id) window.location.href = `blog-detail.html?id=${data.id}`;
else document.getElementById('err').textContent = data.message || 'Failed to create';
}
</script>
