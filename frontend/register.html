<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — InkWell</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&family=Cormorant+Garamond:ital,wght@1,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy: #0d1b2a; --navy-mid: #1a2e45; --navy-light: #243b55;
      --brown: #7c4e32; --brown-light: #a06640; --brown-warm: #c8956a;
      --cream: #f5f0e8; --cream-dark: #e8dfd0; --white: #ffffff; --text-light: #b0c4de;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'DM Sans', sans-serif; background: var(--navy); min-height: 100vh; display: flex; align-items: stretch; }
    .auth-split { display: grid; grid-template-columns: 1fr 1fr; min-height: 100vh; width: 100%; }
    .auth-left {
      background: linear-gradient(160deg, var(--navy-light) 0%, var(--navy-mid) 60%, #1a3350 100%);
      display: flex; flex-direction: column; justify-content: space-between;
      padding: 56px 64px; position: relative; overflow: hidden;
    }
    .auth-left::before { content: ''; position: absolute; top: -80px; right: -80px; width: 320px; height: 320px; border-radius: 50%; background: rgba(124,78,50,0.12); }
    .al-logo { font-family: 'Playfair Display', serif; font-size: 1.8rem; font-weight: 900; color: var(--cream); text-decoration: none; }
    .al-logo span { color: var(--brown-warm); }
    .al-quote blockquote { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1.7rem; color: var(--cream); line-height: 1.5; margin-bottom: 16px; }
    .al-quote cite { font-size: 0.82rem; color: var(--brown-warm); letter-spacing: 0.1em; text-transform: uppercase; font-style: normal; }
    .al-tagline { font-size: 0.82rem; color: var(--text-light); line-height: 1.7; }
    .auth-right { background: var(--cream); display: flex; align-items: center; justify-content: center; padding: 48px; }
    .auth-box { width: 100%; max-width: 420px; }
    .auth-box h1 { font-family: 'Playfair Display', serif; font-size: 2rem; font-weight: 900; color: var(--navy); margin-bottom: 6px; }
    .auth-box p { font-size: 0.9rem; color: #777; margin-bottom: 36px; }
    .auth-box p a { color: var(--brown); text-decoration: none; font-weight: 500; }
    .field-group { margin-bottom: 18px; }
    label { display: block; font-size: 0.8rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--navy-mid); margin-bottom: 7px; }
    input[type="text"], input[type="email"], input[type="password"] { width: 100%; padding: 13px 16px; border: 1.5px solid var(--cream-dark); border-radius: 6px; background: var(--white); font-family: 'DM Sans', sans-serif; font-size: 0.95rem; color: var(--navy); outline: none; transition: border-color 0.2s; }
    input:focus { border-color: var(--brown); }
    .auth-btn { width: 100%; padding: 14px; background: var(--navy); color: var(--cream); border: none; border-radius: 6px; font-family: 'DM Sans', sans-serif; font-size: 0.95rem; font-weight: 600; cursor: pointer; letter-spacing: 0.04em; transition: background 0.2s; margin-top: 8px; }
    .auth-btn:hover { background: var(--navy-light); }
    .error-msg { background: #fde8e8; border: 1px solid #f5c6c6; color: #c0392b; padding: 12px 16px; border-radius: 6px; font-size: 0.85rem; margin-bottom: 16px; display: none; }
    @media (max-width: 720px) { .auth-split { grid-template-columns: 1fr; } .auth-left { display: none; } }
  </style>
</head>
<body>
  <div class="auth-split">
    <div class="auth-left">
      <a href="index.html" class="al-logo">Ink<span>Well</span></a>
      <div class="al-quote">
        <blockquote>"Start writing, no matter what. The water does not flow until the faucet is turned on."</blockquote>
        <cite>— Louis L'Amour</cite>
      </div>
      <p class="al-tagline">Share your stories with a community<br/>that truly values the written word.</p>
    </div>
    <div class="auth-right">
      <div class="auth-box">
        <h1>Create account</h1>
        <p>Already a member? <a href="login.html">Log in here</a></p>
        <div class="error-msg" id="error-msg"></div>
        <div class="field-group">
          <label>Username</label>
          <input type="text" id="username" placeholder="Choose a username" />
        </div>
        <div class="field-group">
          <label>Email Address</label>
          <input type="email" id="email" placeholder="you@example.com" />
        </div>
        <div class="field-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="Min. 6 characters" />
        </div>
        <button class="auth-btn" onclick="doRegister()">Create Account →</button>
      </div>
    </div>
  </div>
  <script src="js/api.js"></script>
  <script>
    async function doRegister() {
      const u = document.getElementById('username').value.trim();
      const e = document.getElementById('email').value.trim();
      const p = document.getElementById('password').value;
      const err = document.getElementById('error-msg');
      err.style.display = 'none';
      if (!u || !e || !p) { err.textContent = 'Please fill in all fields.'; err.style.display = 'block'; return; }
      if (p.length < 6) { err.textContent = 'Password must be at least 6 characters.'; err.style.display = 'block'; return; }
      try {
        const data = await register(u, e, p);
        if (data.token) window.location.href = 'index.html';
        else { err.textContent = data.message || 'Registration failed. Try a different username.'; err.style.display = 'block'; }
      } catch (ex) {
        err.textContent = 'Could not connect to server.'; err.style.display = 'block';
      }
    }
    document.addEventListener('keydown', ev => { if (ev.key === 'Enter') doRegister(); });
  </script>
</body>
</html>
