<!DOCTYPE html>
<html lang='en'>
<head>
<meta charset='UTF-8'>
<title>Profile - BlogHub</title>
<style>
body { font-family: Arial, sans-serif; max-width: 700px; margin: 40px auto; padding: 20px
; }
.profile-card { background:#f1f5f9; border-radius:8px; padding:20px; margin-bottom:20px;
}
input, textarea { width:100%; padding:10px; margin:6px 0;
box-sizing:border-box; border:1px solid #ccc; border-radius:4px; }
button { padding:10px 20px; background:#16a34a; color:white;
border:none; border-radius:4px; cursor:pointer; }
.card { border:1px solid #e2e8f0; border-radius:6px; padding:12px; margin:8px 0; }
a { color:#2563eb; }
</style>
</head>
<body>
<p><a href='index.html'>&larr; Back to Feed</a></p>
<h2>My Profile</h2>
<div class='profile-card'>
<p><b>Username:</b> <span id='p-username'></span></p>
<p><b>Email:</b> <span id='p-email'></span></p>
<label>Bio:</label>
<textarea id='p-bio' rows='3' placeholder='Tell us about yourself...'></textarea>
<button onclick='saveProfile()'>Save Profile</button>
</div>
<h3>My Blogs</h3>
<div id='my-blogs'></div>
<h3>My Bookmarks</h3>
<div id='my-bookmarks'></div>
<script src='js/api.js'></script>
<script>
if (!isLoggedIn()) window.location.href = 'login.html';
async function loadProfile() {
const userId = getUserId();
const user = await getProfile(userId);
document.getElementById('p-username').textContent = user.username;
document.getElementById('p-email').textContent = user.email;
document.getElementById('p-bio').value = user.bio || '';
}
async function loadMyBlogs() {
const blogs = await getBlogs();
const myId = parseInt(getUserId());
const mine = blogs.filter(b => b.author.id === myId);
const el = document.getElementById('my-blogs');
if (!mine.length) { el.innerHTML = '<p>No blogs yet.</p>'; return; }
el.innerHTML = mine.map(b =>
`<div class='card'><a href='blog-detail.html?id=${b.id}'>${b.title}</a></div>`
).join('');
}
async function loadMyBookmarks() {
const bm = await getMyBookmarks();
const el = document.getElementById('my-bookmarks');
if (!bm.length) { el.innerHTML = '<p>No bookmarks yet.</p>'; return; }
el.innerHTML = bm.map(b =>
`<div class='card'><a href='blog-detail.html?id=${b.blog.id}'>${b.blog.title}</a></di
v>`
).join('');
}
async function saveProfile() {
const bio = document.getElementById('p-bio').value;
await updateProfile(bio, '');
alert('Profile updated!');
}
loadProfile(); loadMyBlogs(); loadMyBookmarks();
</script>
</body></html>
