<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile — InkWell</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy: #0d1b2a; --navy-mid: #1a2e45; --navy-light: #243b55;
      --brown: #7c4e32; --brown-light: #a06640; --brown-warm: #c8956a;
      --cream: #f5f0e8; --cream-dark: #e8dfd0; --white: #ffffff; --text-light: #b0c4de;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--navy); }

    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 48px; height: 68px;
      background: var(--navy); border-bottom: 2px solid var(--brown);
    }
    .nav-logo { font-family: 'Playfair Display', serif; font-size: 1.6rem; font-weight: 900; color: var(--cream); text-decoration: none; }
    .nav-logo span { color: var(--brown-warm); }
    .nav-back { color: var(--text-light); text-decoration: none; font-size: 0.88rem; }
    .nav-back:hover { color: var(--brown-warm); }

    /* Profile header band */
    .profile-banner {
      margin-top: 68px;
      background: var(--navy);
      padding: 60px 80px 0;
      position: relative;
    }

    .profile-banner::after {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--brown), var(--brown-warm), var(--brown));
    }

    .profile-top {
      display: flex;
      align-items: flex-end;
      gap: 36px;
      padding-bottom: 36px;
    }

    /*
      ═══════════════════════════════════════════
      PLACEHOLDER: Profile avatar
      Currently shows initials. To show an uploaded
      profile picture, set background-image on .profile-pic.
      If you add profilePic URL to the user API response,
      replace .profile-pic initials with an <img> tag.
      Recommended: 150×150px circular image.
      ═══════════════════════════════════════════
    */
    .profile-pic {
      width: 110px; height: 110px; border-radius: 50%;
      background: var(--brown);
      border: 4px solid var(--brown-warm);
      display: flex; align-items: center; justify-content: center;
      font-size: 2.2rem; font-weight: 700; color: var(--cream);
      flex-shrink: 0;
      position: relative;
    }

    .profile-pic-overlay {
      position: absolute; inset: 0; border-radius: 50%;
      background: rgba(0,0,0,0.4);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity 0.2s;
      cursor: pointer; font-size: 1.2rem;
    }

    .profile-pic:hover .profile-pic-overlay { opacity: 1; }

    .profile-pic input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer;
      border-radius: 50%;
    }

    .profile-info { flex: 1; }

    .profile-username {
      font-family: 'Playfair Display', serif;
      font-size: 1.9rem;
      font-weight: 900;
      color: var(--white);
      margin-bottom: 6px;
    }

    .profile-bio { color: var(--text-light); font-size: 0.92rem; line-height: 1.65; max-width: 560px; margin-bottom: 14px; }

    .profile-stats { display: flex; gap: 32px; }
    .stat-item { text-align: center; }
    .stat-num { font-size: 1.4rem; font-weight: 700; color: var(--white); font-family: 'Playfair Display', serif; }
    .stat-label { font-size: 0.72rem; color: var(--text-light); letter-spacing: 0.08em; text-transform: uppercase; }

    .profile-actions { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-left: auto; align-self: center; }

    .edit-toggle-btn {
      background: var(--brown);
      color: var(--cream);
      border: none;
      padding: 10px 24px;
      border-radius: 6px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }
    .edit-toggle-btn:hover { background: var(--brown-light); }

    /* Content tabs */
    .profile-tabs {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 48px;
      display: flex;
      gap: 4px;
      border-bottom: 1px solid var(--cream-dark);
      margin-top: 32px;
    }

    .tab-btn {
      background: none;
      border: none;
      color: #888;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      font-weight: 500;
      padding: 12px 20px;
      cursor: pointer;
      border-bottom: 2.5px solid transparent;
      margin-bottom: -1px;
      transition: all 0.2s;
      letter-spacing: 0.04em;
    }

    .tab-btn:hover { color: var(--navy); }
    .tab-btn.active { color: var(--navy); border-bottom-color: var(--brown); font-weight: 600; }

    /* Main content area */
    .profile-content {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 48px;
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: 48px;
      align-items: start;
    }

    /* Edit Profile Form */
    .edit-panel {
      background: var(--white);
      border-radius: 10px;
      padding: 32px 36px;
      border: 1px solid var(--cream-dark);
      display: none;
      margin-bottom: 32px;
    }

    .edit-panel.visible { display: block; }

    .edit-panel h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 24px;
      padding-bottom: 12px;
      border-bottom: 2px solid var(--brown);
    }

    .field-group { margin-bottom: 18px; }
    label { display: block; font-size: 0.78rem; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; color: var(--navy-mid); margin-bottom: 7px; }
    input[type="text"], input[type="email"], textarea { width: 100%; padding: 13px 16px; border: 1.5px solid var(--cream-dark); border-radius: 6px; background: var(--cream); font-family: 'DM Sans', sans-serif; font-size: 0.95rem; color: var(--navy); outline: none; transition: border-color 0.2s; }
    input:focus, textarea:focus { border-color: var(--brown); background: var(--white); }
    textarea { min-height: 90px; resize: vertical; }

    .save-btn {
      background: var(--navy);
      color: var(--cream);
      border: none;
      padding: 12px 32px;
      border-radius: 6px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      letter-spacing: 0.04em;
    }
    .save-btn:hover { background: var(--navy-light); }

    /* Blog list */
    .blogs-list { }

    .section-heading {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 20px;
    }

    .section-heading::after { content: ''; display: block; width: 36px; height: 3px; background: var(--brown); margin-top: 7px; }

    .blog-row {
      display: flex;
      gap: 16px;
      align-items: flex-start;
      padding: 20px 0;
      border-bottom: 1px solid var(--cream-dark);
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .blog-row:hover { opacity: 0.8; }

    .blog-row-thumb {
      width: 80px; height: 72px; border-radius: 6px;
      background: var(--navy-mid);
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      color: rgba(255,255,255,0.2); font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.1em;
      text-align: center;
    }

    .blog-row-info { flex: 1; }
    .blog-row-title { font-family: 'Playfair Display', serif; font-size: 1rem; font-weight: 700; color: var(--navy); margin-bottom: 5px; }
    .blog-row-excerpt { font-size: 0.82rem; color: #777; line-height: 1.55; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .blog-row-meta { font-size: 0.75rem; color: #aaa; margin-top: 6px; }

    /* Sidebar info card */
    .info-card {
      background: var(--white);
      border-radius: 10px;
      padding: 24px;
      border: 1px solid var(--cream-dark);
      margin-bottom: 20px;
    }

    .info-card h4 { font-family: 'Playfair Display', serif; font-size: 1rem; font-weight: 700; color: var(--navy); margin-bottom: 14px; padding-bottom: 10px; border-bottom: 2px solid var(--brown); }
    .info-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--cream-dark); }
    .info-row:last-child { border-bottom: none; }
    .info-key { font-size: 0.8rem; color: #888; }
    .info-val { font-size: 0.88rem; font-weight: 500; color: var(--navy); }

    .success-msg { background: #e8f8ee; border: 1px solid #b2dfca; color: #1e7e45; padding: 11px 16px; border-radius: 6px; font-size: 0.85rem; margin-bottom: 14px; display: none; }

    @media (max-width: 900px) {
      .profile-banner { padding: 40px 24px 0; }
      .profile-top { flex-direction: column; align-items: flex-start; }
      .profile-content { grid-template-columns: 1fr; padding: 32px 24px; }
    }
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="nav-logo">Ink<span>Well</span></a>
    <a href="index.html" class="nav-back">← Back to Feed</a>
  </nav>

  <!-- Profile Banner -->
  <div class="profile-banner">
    <div class="profile-top">
      <div class="profile-pic" id="profile-pic">
        <span id="profile-initials">?</span>
        <div class="profile-pic-overlay">✏️</div>
        <!--
          PLACEHOLDER: Profile picture upload (UI only)
          To enable real uploads, add a multipart endpoint in Spring Boot.
          For now this is decorative.
        -->
      </div>
      <div class="profile-info">
        <div class="profile-username" id="profile-username">Loading…</div>
        <div class="profile-bio" id="profile-bio">–</div>
        <div class="profile-stats">
          <div class="stat-item">
            <div class="stat-num" id="posts-count">0</div>
            <div class="stat-label">Stories</div>
          </div>
          <div class="stat-item">
            <div class="stat-num" id="followers-count">–</div>
            <div class="stat-label">Followers</div>
          </div>
        </div>
      </div>
      <div class="profile-actions" id="profile-actions"></div>
    </div>
  </div>

  <div style="max-width:1100px;margin:0 auto;padding:0 48px">
    <div class="profile-tabs">
      <button class="tab-btn active" onclick="switchTab('stories', this)">My Stories</button>
      <button class="tab-btn" onclick="switchTab('edit', this)">Edit Profile</button>
      <button class="tab-btn" onclick="switchTab('bookmarks', this)">Bookmarks</button>
    </div>
  </div>

  <!-- Main content -->
  <div class="profile-content">
    <div>
      <!-- Edit panel -->
      <div class="edit-panel" id="edit-panel">
        <h3>Edit Profile</h3>
        <div class="success-msg" id="save-success"></div>
        <div class="field-group">
          <label>Full Name / Display Username</label>
          <input type="text" id="edit-username" placeholder="Username" />
        </div>
        <div class="field-group">
          <label>Email Address</label>
          <input type="text" id="edit-email" placeholder="you@example.com" />
        </div>
        <div class="field-group">
          <label>Bio</label>
          <textarea id="edit-bio" placeholder="Tell readers about yourself…"></textarea>
        </div>
        <button class="save-btn" onclick="saveProfile()">Save Changes</button>
      </div>

      <!-- Stories tab -->
      <div id="stories-tab">
        <div class="section-heading">Published Stories</div>
        <div id="my-blogs-list"><p style="color:#aaa;font-size:0.88rem">Loading…</p></div>
      </div>

      <!-- Bookmarks tab -->
      <div id="bookmarks-tab" style="display:none">
        <div class="section-heading">Saved Stories</div>
        <div id="bookmarks-list"><p style="color:#aaa;font-size:0.88rem">Loading…</p></div>
      </div>
    </div>

    <!-- Sidebar -->
    <aside>
      <div class="info-card" id="info-card">
        <h4>Account Info</h4>
        <div class="info-row"><span class="info-key">Username</span><span class="info-val" id="sb-username">–</span></div>
        <div class="info-row"><span class="info-key">Email</span><span class="info-val" id="sb-email">–</span></div>
        <div class="info-row"><span class="info-key">Role</span><span class="info-val" id="sb-role">–</span></div>
        <div class="info-row"><span class="info-key">Joined</span><span class="info-val" id="sb-joined">–</span></div>
      </div>
    </aside>
  </div>

  <script src="js/api.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const profileId = params.get('id') || getUserId();
    const isOwnProfile = isLoggedIn() && getUserId() == profileId;

    function switchTab(tab, btn) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('edit-panel').classList.remove('visible');
      document.getElementById('stories-tab').style.display = 'none';
      document.getElementById('bookmarks-tab').style.display = 'none';
      if (tab === 'edit') document.getElementById('edit-panel').classList.add('visible');
      else if (tab === 'stories') document.getElementById('stories-tab').style.display = 'block';
      else if (tab === 'bookmarks') { document.getElementById('bookmarks-tab').style.display = 'block'; loadBookmarks(); }
    }

    function timeAgo(d) {
      if (!d) return '';
      return new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    async function loadProfile() {
      if (!profileId) { window.location.href = 'login.html'; return; }
      try {
        const user = await getUserProfile(profileId);
        const initials = (user.username || 'U').substring(0,2).toUpperCase();
        document.getElementById('profile-initials').textContent = initials;
        document.getElementById('profile-username').textContent = user.username || '–';
        document.getElementById('profile-bio').textContent = user.bio || 'No bio yet.';
        document.getElementById('sb-username').textContent = user.username || '–';
        document.getElementById('sb-email').textContent = user.email || '–';
        document.getElementById('sb-role').textContent = user.role || 'USER';
        document.getElementById('sb-joined').textContent = timeAgo(user.createdAt);
        document.getElementById('edit-username').value = user.username || '';
        document.getElementById('edit-email').value = user.email || '';
        document.getElementById('edit-bio').value = user.bio || '';

        if (!isOwnProfile) {
          document.getElementById('profile-actions').innerHTML = `<button class="edit-toggle-btn" onclick="handleFollow()">+ Follow</button>`;
          // Hide edit tab
          document.querySelectorAll('.tab-btn')[1].style.display = 'none';
        }
      } catch (e) { console.error(e); }

      loadMyBlogs();
    }

    async function loadMyBlogs() {
      try {
        const all = await getBlogs();
        const mine = Array.isArray(all) ? all.filter(b => b.author?.id == profileId) : [];
        document.getElementById('posts-count').textContent = mine.length;

        const list = document.getElementById('my-blogs-list');
        if (mine.length === 0) {
          list.innerHTML = `<p style="color:#aaa;font-size:0.88rem;padding:20px 0">No stories published yet.</p>`;
          return;
        }
        list.innerHTML = mine.map(b => `
          <div class="blog-row" onclick="window.location.href='blog-detail.html?id=${b.id}'">
            <div class="blog-row-thumb">Cover</div>
            <div class="blog-row-info">
              <div class="blog-row-title">${b.title}</div>
              <div class="blog-row-excerpt">${(b.content || '').substring(0, 120)}…</div>
              <div class="blog-row-meta">${timeAgo(b.createdAt)} · ${b.category?.name || 'Uncategorized'}</div>
            </div>
          </div>`).join('');
      } catch (e) {
        document.getElementById('my-blogs-list').innerHTML = `<p style="color:#aaa">Could not load stories.</p>`;
      }
    }

    async function loadBookmarks() {
      if (!isLoggedIn()) { document.getElementById('bookmarks-list').innerHTML = `<p style="color:#aaa">Log in to see bookmarks.</p>`; return; }
      try {
        const bms = await getBookmarks();
        const list = document.getElementById('bookmarks-list');
        if (!bms || bms.length === 0) {
          list.innerHTML = `<p style="color:#aaa;font-size:0.88rem;padding:20px 0">No saved stories yet.</p>`;
          return;
        }
        list.innerHTML = bms.map(bm => `
          <div class="blog-row" onclick="window.location.href='blog-detail.html?id=${bm.blog?.id}'">
            <div class="blog-row-thumb">Cover</div>
            <div class="blog-row-info">
              <div class="blog-row-title">${bm.blog?.title || 'Story'}</div>
              <div class="blog-row-meta">by ${bm.blog?.author?.username || '–'}</div>
            </div>
          </div>`).join('');
      } catch (e) {}
    }

    async function saveProfile() {
      const bio = document.getElementById('edit-bio').value.trim();
      const msg = document.getElementById('save-success');
      try {
        await updateProfile({ bio });
        msg.textContent = 'Profile updated!';
        msg.style.display = 'block';
        document.getElementById('profile-bio').textContent = bio || 'No bio yet.';
        setTimeout(() => msg.style.display = 'none', 3000);
      } catch (e) {
        alert('Could not save profile. Check your backend.');
      }
    }

    async function handleFollow() {
      if (!isLoggedIn()) { window.location.href = 'login.html'; return; }
      await followUser(profileId);
      document.getElementById('profile-actions').innerHTML = `<span style="color:var(--brown-warm);font-size:0.88rem;font-weight:500">✓ Following</span>`;
    }

    loadProfile();
  </script>
</body>
</html>
